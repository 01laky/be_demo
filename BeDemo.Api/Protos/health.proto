// health.proto - gRPC service definition for health check and AI generation
// Used by BeDemo.Api to call the Python AI service (ai_demo)

syntax = "proto3";

package health;

// Health service provides health check and AI generation functionality
service HealthService {
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckResponse);
  rpc Generate (GenerateRequest) returns (GenerateResponse);
  rpc ReviewContent (ContentReviewRequest) returns (ContentReviewResponse);
}

message HealthCheckRequest {}
message HealthCheckResponse {
  string status = 1;
  string message = 2;
}

message GenerateRequest {
  string prompt = 1;
  int32 max_new_tokens = 2;
}

message GenerateResponse {
  string text = 1;
  string error = 2;
}

message ContentReviewRequest {
  string content_type = 1;
  int32 content_id = 2;
  int32 moderation_version = 3;
  int32 face_id = 4;
  string title = 5;
  string body = 6;
  string media_url = 7;
  string creator_id = 8;
}

message ContentReviewResponse {
  string decision = 1;
  double confidence = 2;
  string risk_level = 3;
  repeated string flags = 4;
  string reason = 5;
  string user_message = 6;
  string model_version = 7;
  string trace_id = 8;
  string error = 9;
}
