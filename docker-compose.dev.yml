version: '3.8'

services:
  admin-demo-api:
    build:
      context: ./AdminDemo.Api
      dockerfile: Dockerfile.dev
    container_name: admin-demo-api
    ports:
      - "8000:8000"   # HTTP
      - "8001:8001"   # HTTPS
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://0.0.0.0:8001;http://0.0.0.0:8000
      - ASPNETCORE_Kestrel__Certificates__Default__Password=
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/app/https/dev-cert.pfx
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/AdminDemoDb.db
    volumes:
      - ./AdminDemo.Api/data:/app/data
      - ./AdminDemo.Api:/app
      - ./AdminDemo.Api/https:/app/https:ro
    restart: unless-stopped
    networks:
      - admin-demo-network

networks:
  admin-demo-network:
    driver: bridge
